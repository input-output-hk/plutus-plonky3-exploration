p3-air = { git = "https://github.com/Plonky3/Plonky3.git", tag = "v0.5.1" }
p3-challenger = { git = "https://github.com/Plonky3/Plonky3.git", tag = "v0.5.1" }
p3-commit = { git = "https://github.com/Plonky3/Plonky3.git", tag = "v0.5.1" }
