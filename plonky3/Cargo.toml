[package]
name = "plonky3-exploration"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "fib"
path = "src/fib_air.rs"

[[bin]]
name = "export_proof"
path = "src/export_proof.rs"

[dependencies]
rand = "0.10.1"
postcard = { version = "1.1.3", features = ["alloc"] }
serde_json = "1"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

p3-field = { git = "https://github.com/Plonky3/Plonky3.git", tag = "v0.5.1" }
